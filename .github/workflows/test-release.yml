name: Test Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. "0.0.1.280")'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          python-version: ${{ matrix.python-version }}
          activate-environment: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        shell: bash
        run: |
          set -euxo pipefail
          # --refresh bypasses uv's HTTP cache so we don't hit a stale simple
          # index from before the new wheels were uploaded. Retry a few times
          # in case PyPI's CDN edge hasn't propagated the new release yet.
          for attempt in 1 2 3 4 5; do
            if uv pip install -v --refresh "xtr-warp-rs==${{ inputs.release_tag }}"; then
              break
            fi
            if [ "$attempt" = "5" ]; then
              echo "install failed after 5 attempts" >&2
              exit 1
            fi
            echo "install attempt $attempt failed; sleeping 30s before retry"
            sleep 30
          done
          uv pip install pytest pytest-cov
          pytest tests/test.py tests/test_index_management.py tests/test_filtering.py
