name: CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.13", "3.14"]

    runs-on: ${{ matrix.os }}
    env:
      LIBTORCH_USE_PYTORCH: "1"
      LIBTORCH_BYPASS_VERSION_CHECK: "1"
      PIP_EXTRA_INDEX_URL: "https://download.pytorch.org/whl/cpu/torch_stable.html"
      # PyO3 ABI3 forward compatibility for Python 3.14+ (no-op for <=3.13)
      PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          python-version: ${{ matrix.python-version }}
          activate-environment: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Install deps and run tests
        run: |
          uv pip install "torch==2.9.0" pytest pytest-cov maturin numpy setuptools
          uv pip install --no-build-isolation -e .
          pytest tests/test.py tests/test_index_management.py tests/test_filtering.py
