name: Release Wheels

on:
  workflow_dispatch:
    inputs:
      base_version:
        description: 'Base version (e.g. "0.0.1")'
        required: true
        type: string
      torch_suffix:
        description: "Torch suffix (270/280/290/2100/2110)"
        required: true
        type: choice
        options: ["270", "280", "290", "2100", "2110"]
      torch_version:
        description: 'Torch pinned version (e.g. "2.11.0")'
        required: true
        type: string
      torch_req:
        description: 'Torch requirement metadata (e.g. "torch>=2.11,<2.12")'
        required: true
        type: string
      tch_version:
        description: 'tch/torch-sys/pyo3-tch crate version (e.g. "0.24.0" for torch 2.11; required for torch >=2.10 due to libtorch ABI changes)'
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      base_version:
        required: true
        type: string
      torch_suffix:
        required: true
        type: string
      torch_version:
        required: true
        type: string
      torch_req:
        required: true
        type: string
      tch_version:
        required: false
        type: string
        default: ""
    secrets:
      PYPI_API_TOKEN:
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.torch_suffix }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: Build wheels (torch ${{ inputs.torch_version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Free Disk Space (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Prepare version metadata
        shell: bash
        run: |
          ARGS=(
            --version "${{ inputs.base_version }}.${{ inputs.torch_suffix }}"
            --cargo-version "${{ inputs.base_version }}"
            --torch-req "${{ inputs.torch_req }}"
          )
          if [ -n "${{ inputs.tch_version }}" ]; then
            ARGS+=(--tch-version "${{ inputs.tch_version }}")
          fi
          python scripts/release_prep.py "${ARGS[@]}"

      - name: Prepare Python Version for CIBW_BUILD
        id: prepare_python_version
        shell: bash
        run: |
          PYTHON_VERSION_NO_DOT=$(echo "${{ matrix.python-version }}" | tr -d '.')
          echo "PYTHON_VERSION_NO_DOT=$PYTHON_VERSION_NO_DOT" >> $GITHUB_OUTPUT

      - name: Pre-download virtualenv
        shell: bash
        run: |
          VENV_VERSION="20.30.0"
          if [ "$RUNNER_OS" = "Windows" ]; then
            CACHE_DIR="$LOCALAPPDATA/pypa/cibuildwheel/Cache"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            CACHE_DIR="$HOME/Library/Caches/cibuildwheel"
          else
            CACHE_DIR="$HOME/.cache/cibuildwheel"
          fi
          mkdir -p "$CACHE_DIR"
          DEST="$CACHE_DIR/virtualenv-${VENV_VERSION}.pyz"
          if [ ! -f "$DEST" ]; then
            for i in 1 2 3 4 5; do
              echo "Attempt $i: downloading virtualenv ${VENV_VERSION}..."
              if curl -sL --retry 3 --retry-delay 5 -o "$DEST" \
                "https://github.com/pypa/get-virtualenv/blob/${VENV_VERSION}/public/virtualenv.pyz?raw=true"; then
                echo "Downloaded successfully."
                break
              fi
              echo "Download failed, retrying in $((i * 10))s..."
              sleep $((i * 10))
            done
          fi

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23.3
        env:
          CIBW_BUILD: "cp${{ steps.prepare_python_version.outputs.PYTHON_VERSION_NO_DOT }}-*"
          CIBW_SKIP: "*-manylinux_i686 *-musllinux_* *-win32"
          CIBW_BUILD_VERBOSITY: 1
          LIBTORCH_USE_PYTORCH: "1"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_MANYLINUX_ARM64_IMAGE: manylinux_2_28
          LIBTORCH_BYPASS_VERSION_CHECK: "1"
          CIBW_ENVIRONMENT: |
            PIP_EXTRA_INDEX_URL="https://download.pytorch.org/whl/cpu/torch_stable.html"
            PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1
          CIBW_ENVIRONMENT_PASS_LINUX: LIBTORCH_USE_PYTORCH LIBTORCH_BYPASS_VERSION_CHECK PIP_EXTRA_INDEX_URL PYO3_USE_ABI3_FORWARD_COMPATIBILITY
          CIBW_PIP_ARGS: "--no-cache-dir --no-build-isolation"
          CIBW_BEFORE_BUILD: "pip install torch==${{ inputs.torch_version }} numpy maturin delvewheel"
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            LD_LIBRARY_PATH=$(python -c 'import torch, os; print(os.path.join(os.path.dirname(torch.__file__), "lib"))'):$LD_LIBRARY_PATH
            auditwheel repair -w {dest_dir} {wheel}
            --exclude libtorch.so --exclude libtorch_cpu.so --exclude libtorch_python.so
            --exclude libtorch_cuda.so --exclude libtorch_cuda_cu.so --exclude libtorch_cuda_cpp.so
            --exclude libtorch_cuda_linalg.so --exclude libtorch_global_deps.so --exclude libtorch_nvshmem.so
            --exclude libc10.so --exclude libc10_cuda.so --exclude libshm.so
            --exclude libcudart.so.13 --exclude libcudart.so.12
            --exclude libnvToolsExt.so.1 --exclude libnvJitLink.so.13 --exclude libnvJitLink.so.12
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >
            DYLD_LIBRARY_PATH=$(python -c 'import torch, os; print(os.path.join(os.path.dirname(torch.__file__), "lib"))')
            delocate-wheel -w {dest_dir} -v {wheel}
            --exclude libtorch.dylib --exclude libtorch_cpu.dylib --exclude libtorch_python.dylib
            --exclude libc10.dylib --exclude libshm.dylib
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: >-
            FOR /F "usebackq tokens=*" %i IN (`python -c "import torch, os; print(os.path.join(os.path.dirname(torch.__file__), 'lib'))"`) DO (set "PATH=%i;%PATH%" && delvewheel repair -w {dest_dir} {wheel} --no-dll torch.dll --no-dll torch_cpu.dll --no-dll torch_python.dll --no-dll torch_cuda.dll --no-dll torch_global_deps.dll --no-dll c10.dll --no-dll c10_cuda.dll --no-dll shm.dll)

      - name: Upload wheels to artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ inputs.torch_suffix }}-${{ matrix.os }}-py${{ matrix.python-version }}
          path: ./wheelhouse/*.whl

  publish:
    name: Publish to PyPI (torch ${{ inputs.torch_version }})
    needs: build_wheels
    runs-on: ubuntu-latest

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-${{ inputs.torch_suffix }}-*-py*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
